    (function () {
      try {
        const saved = document.cookie.split('; ').find(row => row.startsWith('settings='));

          const settings = JSON.parse(decodeURIComponent(saved.split('=')[1]));
          const validThemes = ['sleek', 'ncfca-dark'];
          const theme = validThemes.includes(settings.theme) ? settings.theme : 'sleek';
